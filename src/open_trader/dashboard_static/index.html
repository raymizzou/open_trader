<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Trader 持仓实时看板</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <script src="/static/dashboard.js" defer></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <header class="dashboard-header">
        <section class="header-brand-panel" aria-label="看板筛选">
          <div class="brand-block">
            <span class="brand">Open Trader</span>
            <span class="page-title">持仓实时看板</span>
          </div>
          <div class="header-filter-block">
            <div id="header-market-filters" class="segmented-control" aria-label="市场筛选">
              <button class="filter-button active" type="button" data-market="ALL">全部市场</button>
              <button class="filter-button" type="button" data-market="US">US</button>
              <button class="filter-button" type="button" data-market="HK">HK</button>
              <button class="filter-button" type="button" data-market="CASH">现金</button>
            </div>
            <div id="header-broker-filters" class="segmented-control dynamic-filters" aria-label="券商筛选"></div>
          </div>
          <span id="current-view-label" class="current-view-label">当前视图：全部市场 · 全部券商</span>
        </section>

        <section class="header-assets-panel" aria-label="当前视图资产">
          <article class="current-view-card">
            <span class="summary-label">当前视图总资产 HKD</span>
            <strong id="current-view-value">-</strong>
            <div class="current-view-breakdown">
              <span id="current-view-holding-value">持仓资产 -</span>
              <strong id="current-view-holding-weight">-</strong>
            </div>
            <span id="current-view-cash-note" class="summary-note">现金类资产 -</span>
          </article>
          <div id="broker-summary-cards" class="broker-summary-cards">
            <article class="broker-summary-card" data-broker-placeholder="futu">
              <span class="summary-label">富途暂无数据</span>
              <strong>-</strong>
            </article>
            <article class="broker-summary-card" data-broker-placeholder="tiger">
              <span class="summary-label">老虎暂无数据</span>
              <strong>-</strong>
            </article>
            <article class="broker-summary-card" data-broker-placeholder="phillip">
              <span class="summary-label">辉立暂无数据</span>
              <strong>-</strong>
            </article>
          </div>
        </section>

        <section class="header-source-panel" aria-label="连接与数据来源">
          <div class="source-header-row">
            <span id="quote-status" class="status-pill status-muted">等待行情</span>
            <button id="refresh-quotes" class="primary-button" type="button">刷新行情</button>
          </div>
          <div id="source-status-list" class="source-status-list"></div>
          <span id="last-refresh" class="last-refresh">尚未刷新</span>
        </section>
      </header>

      <div class="runtime-compatibility hidden" hidden aria-hidden="true">
        <div id="market-filters">
          <button class="filter-button active" type="button" data-market="ALL">全部市场</button>
          <button class="filter-button" type="button" data-market="US">US</button>
          <button class="filter-button" type="button" data-market="HK">HK</button>
          <button class="filter-button" type="button" data-market="CASH">现金</button>
        </div>
        <div id="broker-filters"></div>
        <strong id="summary-value">-</strong>
        <span id="summary-holding-bar"></span>
        <span id="summary-holding-value"></span>
        <strong id="summary-holding-weight">-</strong>
        <span id="summary-cash-note"></span>
        <strong id="summary-refresh-status">-</strong>
        <span id="summary-refresh-note"></span>
        <strong id="summary-brokers">-</strong>
        <span id="summary-detail-month"></span>
        <strong id="summary-health">-</strong>
        <span id="summary-health-note"></span>
      </div>

      <main class="workspace-grid">
        <section class="holdings-panel">
          <div class="section-heading">
            <div>
              <h1>持仓列表</h1>
              <p>合并持仓可展开查看券商与账户明细。</p>
            </div>
            <span id="visible-count" class="count-pill">-</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>明细</th>
                  <th>市场</th>
                  <th>标的</th>
                  <th>券商</th>
                  <th>数量</th>
                  <th>持仓价</th>
                  <th>实时价</th>
                  <th>港元市值</th>
                  <th>盈亏</th>
                  <th>动作</th>
                </tr>
              </thead>
              <tbody id="holdings-body">
                <tr>
                  <td colspan="10" class="empty-state">加载中</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="cash-detail-panel" class="cash-detail-panel hidden" aria-live="polite"></div>
          <div id="symbol-detail-panel" class="symbol-detail-panel hidden" aria-live="polite"></div>
        </section>

        <aside class="right-rail">
          <section class="info-panel">
            <div class="section-heading compact">
              <h2>今日交易动作</h2>
              <span id="action-count" class="count-pill">-</span>
            </div>
            <div id="trade-actions" class="action-list"></div>
          </section>

          <section class="info-panel">
            <div class="section-heading compact">
              <h2>实时连接与任务</h2>
            </div>
            <dl class="connection-list">
              <div>
                <dt>行情状态</dt>
                <dd id="connection-status">等待行情</dd>
              </div>
              <div>
                <dt>上次成功</dt>
                <dd id="connection-success">-</dd>
              </div>
              <div>
                <dt>刷新频率</dt>
                <dd id="connection-poll">-</dd>
              </div>
              <div>
                <dt>任务状态</dt>
                <dd id="connection-task">加载中</dd>
              </div>
            </dl>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
